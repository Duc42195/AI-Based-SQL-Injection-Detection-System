# Central configuration for the SQLi Detection System.
# Nothing thresholds/paths/timeouts related should be hardcoded in modules.
# Override any value at runtime via env vars: SQLIDS_<SECTION>_<KEY>
# e.g. SQLIDS_DECISION_OVERKILL_TIMEOUT_SECONDS=120

project:
  name: "ai-sqli-detection"
  random_seed: 42

logging:
  level: "INFO"

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_adversarial: "data/adversarial"
  models_dir: "models"
  # Directory holding evaluation/report JSON artifacts (served by the metrics API).
  reports_dir: "reports"
  # DEPRECATED generic active version — kept for backward-compat but unused; the
  # real model folders are versioned per-branch (see each branch's
  # `active_version` below, e.g. branch1_supervised.active_version,
  # branch2_anomaly.active_version).
  active_version: "v0"

preprocessing:
  # Max decode passes for nested/multi-layer encoding (URL/hex/CHAR()).
  max_decode_iterations: 3
  lowercase_keywords: true
  mark_comments: true

# Multi-class label schema for Branch 1 (adjust to what the data actually has).
# Branch 3 (session) inherits these as its per-query base labels.
labels:
  classes:
    normal: 0
    union_based: 1
    error_based: 2
    boolean_blind: 3
    time_blind: 4
    stacked: 5

branch1_supervised:
  # CHOSEN (16/7) after comparing 4 candidates on F1-macro vs latency vs size
  # (see reports/nhanh1_architecture_comparison.json + notebook). All 4 scored
  # F1-macro 0.985-0.993 (differences negligible); tfidf_logreg picked for the
  # best latency/size/simplicity trade-off. LightGBM had the top F1 but ~60ms
  # p50 latency (too slow for a real-time proxy); DistilBERT gave no F1 gain
  # for 256MB + GPU + 24-min training; cnn_sqltok is the fast/tiny fallback.
  #   "tfidf_logreg"  |  "tfidf_lightgbm"  |  "distilbert"  |  "cnn_sqltok"
  architecture: "tfidf_logreg"
  multiclass: true
  # Model folder under models_dir loaded by the API at inference time
  # (models/<active_version>/{model.joblib,vectorizer.joblib,metadata.json}).
  active_version: "nhanh1_v1"
  # Probability threshold above which a query is flagged as SQLi (any attack class).
  decision_threshold: 0.5
  tfidf:
    analyzer: "char_wb"
    ngram_min: 2
    ngram_max: 4
    max_features: 50000
  distilbert:
    pretrained: "distilbert-base-uncased"
    max_length: 128
    batch_size: 32
    epochs: 3
    learning_rate: 5.0e-5
  cnn_sqltok:
    # SQL-keyword-aware tokenizer + small 1D-CNN (~69K params reference
    # architecture from the Related Work survey - a lightweight alternative
    # to a full transformer).
    vocab_size: 2000
    max_length: 128
    embedding_dim: 32
    num_filters: 64
    kernel_sizes: [3, 4, 5]
    epochs: 5
    batch_size: 64
    learning_rate: 1.0e-3
  # Per-class undersample target when building data/processed/nhanh1_train.csv.
  # Classes with fewer available rows than this are kept in full (see
  # data_contract.md Muc 2.1). synthetic_stacked_count = size of the
  # generated `stacked` batch (no real-world source has this class).
  balance:
    target_per_class: 15000
    # Full unique pool from src/preprocessing/synthetic_stacked.py (11 prefixes
    # x 11 statements x 3 terminators = 363). No real source has this class.
    synthetic_stacked_count: 363
    test_fraction: 0.2
    # Labels EXCLUDED from data/processed/nhanh1_train.csv entirely (16/7).
    # `stacked` (5) disabled: 100% synthetic (363 templated payloads) and hit
    # 100% recall across all 4 compared architectures - a red flag that the
    # synthetic data is trivially separable, not a real signal of model
    # quality. Re-enable (remove from this list) once real stacked-query
    # examples are available (e.g. from D6 Docker-lab/sqlmap traffic).
    exclude_labels: [5]

branch2_anomaly:
  # Trained on BENIGN ONLY. Output is a continuous anomaly score used both as a
  # per-query zero-day flag and as an extra feature dim fed into Branch 3.
  # "isolation_forest" | "one_class_svm"
  # CHOSEN (training audit 16/7): OCSVM (gamma=0.01, nu=0.005) AUC=0.887
  #   — significantly out-performs IF (AUC=0.734) and the untuned OCSVM (0.805).
  algorithm: "one_class_svm"
  # Model folder under models_dir (created once Branch 2 is trained). Until then
  # the API reports this branch as "not_ready" instead of crashing.
  active_version: "nhanh2_v1"
  # Expected fraction of anomalies in the (Normal) training data.
  # NOTE: training data is 100 % benign (0 % anomaly), so this should be very
  # small — IF='auto' uses the algorithm's own estimate; OCSVM default nu=0.001.
  # Shared contamination (used for Isolation Forest). One-Class SVM uses its
  # own ocsvm_nu below — each algorithm independently tuned.
  contamination: 0.01
  # One-Class SVM specific hyperparameters (tuned via grid search 16/7).
  ocsvm_nu: 0.005
  ocsvm_gamma: 0.01
  # Scale all features with StandardScaler before training.  EMPIRICAL NOTE
  # (training audit 16/7): scaling all features *hurt* AUC for both algorithms
  # (IF 0.734→0.678, OCSVM 0.805→0.533) because length carries most of the
  # discriminative power (permutation-importance drop 0.288) while other features
  # (e.g. special_char_ratio, mean 0.039 for both groups) are noisy.  Scaling
  # equalises their influence and dilutes the length signal.  Keep disabled
  # unless feature selection is applied first.
  scale_features: false
  # Feature names to apply log1p-transform before scaling (handles extreme
  # right-skewed distributions — "length" has max 5 370 vs mean 47).
  log_transform_features:
    - "length"
  # Statistical/structural features extracted per query (not TF-IDF - Branch 2
  # needs to generalize to unseen syntax, so features describe SHAPE not content).
  features:
    - "length"
    - "special_char_ratio"
    - "sql_keyword_count"
    - "entropy"
  # Held-out split of the benign pool for evaluating FPR (build_nhanh2_dataset.py).
  test_fraction: 0.2
  # Hyperparameter tuning via grid search (disabled by default; enable for
  # production).
  tune:
    enabled: false
    validation_fraction: 0.2
    scoring: "roc_auc"
    # Grids are expanded as Cartesian product.
    isolation_forest:
      n_estimators: [50, 100, 200]
      contamination: [0.001, 0.005, 0.01, "auto"]
    one_class_svm:
      gamma: ["scale", "auto", 0.1, 0.01]
      contamination: [0.001, 0.005, 0.01, 0.05]

branch3_session:
  enabled: true
  active_version: "nhanh3_v1"
  gru_active_version: "nhanh3_gru_v1"
  session_idle_gap_seconds: 1800
  sequence_model: "gru"
  max_session_len: 64
  session_classes:
    benign: 0
    boolean_blind: 1
    time_blind: 2
    query_splitting: 3
  step_features:
    - "length"
    - "special_char_ratio"
    - "sql_keyword_count"
    - "entropy"
    - "is_attack_query"
  simulation:
    num_sessions_per_class: 5000
    seed: 42
    benign:
      min_len: 3
      max_len: 15
      noise_fraction: 0.02
    blind:
      leading_normals: [1, 2]
      attack_queries: [2, 8]
      trailing_normals: [0, 1]
      normal_between_prob: 0.3
    test_fraction: 0.2
  gru:
    hidden_dim: 64
    num_layers: 2
    dropout: 0.3
    bidirectional: false
  training:
    batch_size: 32
    epochs: 30
    learning_rate: 1.0e-3
    weight_decay: 1.0e-5
    early_stop_patience: 5

decision:
  # Overkill policy: SQLi=0 & Anomaly=1 -> hold for Admin review.
  overkill_timeout_seconds: 300   # deny-by-default after this
  queue_backend: "sqlite"         # simple, file-backed queue for the MVP
  queue_path: "data/overkill_queue.db"

continual_learning:
  new_data_path: "data/processed/confirmed_labels.jsonl"
  # Rehearsal: fraction of old data mixed with new data during retrain.
  rehearsal_old_fraction: 0.5
  # Validation gate: promote only if new model is at least as good.
  min_f1: null        # null -> must be >= current production model's F1
  max_fpr: null       # null -> must be <= current production model's FPR

monitoring:
  drift_metric: "psi"             # "psi" | "kl"
  psi_alert_threshold: 0.2        # >0.2 commonly treated as significant drift
  retrain_schedule: "weekly"
  metrics_log_path: "data/processed/drift_metrics.jsonl"

api:
  host: "0.0.0.0"
  port: 8000
  title: "SQLi Detection API"
  # API contract version — also the URL prefix (/api/v1/...). Bump on breaking
  # changes so the Streamlit client can pin against a stable shape.
  api_version: "v1"
  # CORS allow-origins for the Streamlit frontend (runs on a different port).
  # "*" is fine for the local demo; tighten for any real deployment.
  cors_origins: ["*"]
